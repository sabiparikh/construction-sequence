<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Build A House</title>
<link href="https://fonts.googleapis.com/css2?family=Lato:wght@300;700;900&display=swap" rel="stylesheet">

<style>
body{
  font-family:Lato;
  background:#000;
  color:#fff;
  text-align:center;
  padding:10px;
}
*{color:#fff;}

h1{font-size:42px;font-weight:900;margin:10px;}

button{
  padding:12px;
  margin:6px;
  border:2px solid #fff;
  background:#000;
  color:#fff;
  font-size:16px;
  width:90%;
  max-width:420px;
}

.stats{font-weight:700;margin:10px;font-size:18px;}
.done{font-size:14px;margin:10px;font-weight:700;}

.popup{
  position:fixed;
  top:0;left:0;width:100%;height:100%;
  background:rgba(0,0,0,0.95);
  display:none;
  justify-content:center;
  align-items:center;
  flex-direction:column;
  padding:20px;
}
</style>
</head>

<body>

<h1>BUILD A HOUSE</h1>

<div class="stats" id="stats"></div>
<div class="done" id="doneSteps"></div>
<div id="game"></div>

<div class="popup" id="popup">
  <div id="popupText"></div>
  <button onclick="closePopup()">OK</button>
</div>

<div class="popup" id="endPopup">
  <div id="endText"></div>
  <button onclick="location.reload()">Play Again</button>
</div>

<script>
const correctOrder=[
"Clean land","Build base","Build frame","Add walls","Add roof",
"Add doors/windows","Add water system","Add electricity",
"Turn on lights","Paint house","Finish floors","House ready"
];

let steps=[...correctOrder].sort(()=>Math.random()-0.5);
let time=28, money=1500, energy=120;
let current=0;
let done=[];
let usedEvents=[];

function updateStats(){
stats.innerHTML=`Time: ${time} days | Money: ₹${money} | Energy: ${energy}`;
doneSteps.innerHTML="Completed: "+done.join(", ");
if(time<=0||money<=0||energy<=0) endGame("GAME OVER");
}

function popup(msg){
popupText.innerHTML=msg;
document.getElementById("popup").style.display="flex";
}

function closePopup(){
document.getElementById("popup").style.display="none";
triggerEvent();
}

function endGame(msg){
endText.innerHTML=msg;
document.getElementById("endPopup").style.display="flex";
}

function penalty(){
time-=4; money-=100; energy-=20;
popup("Wrong step! Penalty applied.");
updateStats();
}

function choose(step){
if(step===correctOrder[current]){
  done.push(step);
  current++;
  time-=2; energy-=10;
  if(current===correctOrder.length) return endGame("🎉 YOU WON 🎉");
}else penalty();

updateStats();
render();
}

function render(){
game.innerHTML="";
steps.forEach(s=>{
 if(!done.includes(s))
 game.innerHTML+=`<button onclick="choose('${s}')">${s}</button>`;
});
}

const events=[
{
name:"GRAP",
run:()=>{
let c=confirm("GRAP 3! Continue illegally (OK) or stop 7 days (Cancel)");
if(!c) time-=7;
}
},
{
name:"RAIN",
run:()=>{
let c=confirm("Rainstorm! Pay ₹500 (OK) or stop 2 days (Cancel)");
if(c) money-=500; else time-=2;
}
},
{
name:"MCD",
run:()=>{
let c=confirm("MCD complaint! Pay ₹300 (OK) or stop 3 days (Cancel)");
if(c) money-=300; else time-=3;
}
}
];

function triggerEvent(){
if(Math.random()<0.25 && usedEvents.length<events.length){
 let e=events.find(x=>!usedEvents.includes(x.name));
 if(e){ usedEvents.push(e.name); e.run(); updateStats(); }
}
}

updateStats();
render();
</script>

</body>
</html>

<script>
// SHUFFLE UTILITY
function shuffle(array) {
  for (let i = array.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [array[i], array[j]] = [array[j], array[i]];
  }
  return array;
}

// SHUFFLED STEPS
let shuffledSteps;

function initGame() {
  current = 0;
  time = 28;
  money = 1500;
  energy = 120;
  gameOver = false;

  document.getElementById("restartBtn").style.display = "none";
  document.getElementById("event").innerText = "";

  ["r1","r2","you"].forEach(id=>{
    document.getElementById(id).style.width = "0%";
  });

  updateStats();

  // Shuffle steps for display but keep track of original order
  shuffledSteps = shuffle([...stepsList.map((s, i) => ({...s, originalIndex: i}))]);
  loadSteps();
}

// LOAD BUTTONS
function loadSteps() {
  if (gameOver) return;

  const div = document.getElementById("steps");
  div.innerHTML = "";

  shuffledSteps.forEach((stepObj) => {
    let btn = document.createElement("button");
    btn.innerHTML = `<span class="icon">${stepObj.icon}</span>${stepObj.text}`;

    // Grey out only if this step has already been correctly completed
    if(stepObj.originalIndex < current) btn.classList.add("correct");

    btn.onclick = () => handleStep(stepObj, btn);
    div.appendChild(btn);
  });
}

// HANDLE STEP
function handleStep(stepObj, btn) {
  if (gameOver) return;

  if (stepObj.originalIndex === current) {
    btn.classList.add("correct"); // Turn grey only if correct step
    current++;
    energy -= 5;
    time -= 1;

    triggerEvents();
    updateStats();
    updateProgress();
    confettiBurst();

    if (current === stepsList.length) {
      endGame("🏆 You Win!");
    }

    loadSteps(); // reload buttons with already correct ones grey
  } else {
    money -= 100;
    energy -= 20;
    time -= 4;
    alert("❌ Wrong order! Try again.");
    updateStats();
  }
}
</script>

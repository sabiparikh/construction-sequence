<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<link href="https://fonts.googleapis.com/css2?family=Lato:wght@300;700;900&display=swap" rel="stylesheet">
<title>Build A House</title>

<style>
body{font-family:Lato,sans-serif;background:#fff;color:#000;text-align:center;padding:10px;}
h1{font-size:44px;font-weight:900;margin:5px;}
.container{max-width:600px;margin:auto;}
.stats{display:flex;justify-content:space-between;font-weight:700;margin:10px 0;}
button{width:100%;padding:14px;margin:6px 0;border:2px solid black;background:white;font-size:16px;cursor:pointer;}
.eventBox{border:3px dashed black;padding:12px;margin:10px;display:none;}
#restart{display:none;margin-top:15px;font-weight:bold;}
</style>
</head>

<body>
<div class="container">
<h1>BUILD A HOUSE</h1>
<p>Build the house in correct order before resources run out.</p>

<div class="stats">
<div>Days: <span id="time">28</span></div>
<div>₹: <span id="money">1500</span></div>
<div>Energy: <span id="energy">120</span></div>
</div>

<h3>Completed Steps</h3>
<div id="completed"></div>

<div id="event" class="eventBox"></div>
<div id="buttons"></div>

<button id="restart" onclick="location.reload()">PLAY AGAIN</button>
</div>

<script>
let time=28,money=1500,energy=120;
let steps=["Clean land","Build base","Build frame","Add walls","Add roof",
"Add doors/windows","Add water system","Add electricity","Turn on lights",
"Paint house","Finish floors","House ready"];

let correct=[...steps];
shuffle(steps);
let index=0;
let completedList=[];
let gameEnded=false;

function shuffle(a){
 for(let i=a.length-1;i>0;i--){
  let j=Math.floor(Math.random()*(i+1));
  [a[i],a[j]]=[a[j],a[i]];
 }
}

function drawButtons(){
 if(gameEnded) return;
 let box=document.getElementById("buttons");
 box.innerHTML="";
 steps.forEach(step=>{
   if(!completedList.includes(step)){
     let btn=document.createElement("button");
     btn.innerText=step;
     btn.onclick=()=>choose(step);
     box.appendChild(btn);
   }
 });
}

function choose(step){
 if(gameEnded) return;
 if(step===correct[index]){
   index++;
   completedList.push(step);
   time-=2;energy-=10;money-=50;
   updateCompleted();
 }else{
   time-=4;energy-=20;money-=100;
 }
 updateStats();
 drawButtons();
 checkGame();
}

function updateCompleted(){
 document.getElementById("completed").innerHTML=
 completedList.map(s=>"✔ "+s).join("<br>");
}

function updateStats(){
 document.getElementById("time").innerText=Math.max(0,time);
 document.getElementById("money").innerText=Math.max(0,money);
 document.getElementById("energy").innerText=Math.max(0,energy);
}

function endGame(msg){
 gameEnded=true;
 document.getElementById("event").style.display="block";
 document.getElementById("event").innerHTML="<h3>"+msg+"</h3>";
 document.getElementById("restart").style.display="block";
 document.getElementById("buttons").innerHTML="";
}

function checkGame(){
 if(time<=0||money<=0||energy<=0) endGame("GAME OVER");
 if(index===correct.length) endGame("🏡 HOUSE COMPLETED!");
}

/* EVENTS — only once each */
let events=["grap","rain","mcd"];
let eventsToTrigger=Math.floor(Math.random()*2)+1;

setTimeout(triggerEvent,12000);
setTimeout(triggerEvent,25000);

function triggerEvent(){
 if(gameEnded||eventsToTrigger<=0||events.length==0) return;
 eventsToTrigger--;
 let e=events.splice(Math.floor(Math.random()*events.length),1)[0];
 window[e]();
}

function showEvent(text,op1,op2){
 let box=document.getElementById("event");
 box.style.display="block";
 box.innerHTML=`<p>${text}</p>
 <button onclick="${op1}">Option 1</button>
 <button onclick="${op2}">Option 2</button>`;
}

function closeEvent(){
 document.getElementById("event").style.display="none";
 updateStats();checkGame();
}

function grap(){
 showEvent("GRAP 3 imposed! Stop work 7 days or continue illegally?",
 "time-=7;closeEvent()",
 "money-=200;closeEvent()");
}
function rain(){
 showEvent("Rainstorm! Pay ₹500 cover or stop 2 days?",
 "money-=500;closeEvent()",
 "time-=2;closeEvent()");
}
function mcd(){
 showEvent("MCD complaint! Pay ₹300 or stop 3 days?",
 "money-=300;closeEvent()",
 "time-=3;closeEvent()");
}

drawButtons();
updateStats();
</script>
</body>
</html>
